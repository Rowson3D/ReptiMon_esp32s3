<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReptiMon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ── Corporate Memphis botanical deco ───────────────────────────────── -->
<!-- Palette: #2EC97D (mid green) #5EE7A2 (light green) #1d5c3c (dark green) -->
<div class="repti-deco" aria-hidden="true">

  <!-- TOP-LEFT: two leaves angled into corner + scattered shapes -->
  <svg class="rd rd-tl" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 340">
    <!-- Leaf 1: large, dark, tip points into top-left corner -->
    <g transform="translate(10,55) rotate(-42, 55,82)">
      <path fill="#2EC97D" d="M55,4 C85,4 106,32 106,82 C106,132 85,160 55,160 C25,160 4,132 4,82 C4,32 25,4 55,4Z"/>
      <line x1="55" y1="6" x2="55" y2="157" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.38"/>
      <path fill="none" stroke="white" stroke-width="1.8" opacity="0.28" stroke-linecap="round"
        d="M55,36 L18,22 M55,62 L7,54 M55,88 L9,86 M55,114 L22,120
           M55,36 L92,22 M55,62 L101,54 M55,88 L99,86 M55,114 L88,120"/>
    </g>
    <!-- Leaf 2: smaller, light green, slightly different angle -->
    <g transform="translate(145,148) rotate(-18, 42,62)">
      <path fill="#5EE7A2" d="M42,4 C64,4 80,26 80,62 C80,98 64,120 42,120 C20,120 4,98 4,62 C4,26 20,4 42,4Z"/>
      <line x1="42" y1="5" x2="42" y2="118" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
      <path fill="none" stroke="white" stroke-width="1.6" opacity="0.28" stroke-linecap="round"
        d="M42,28 L16,18 M42,50 L6,44 M42,72 L8,70 M42,94 L18,98
           M42,28 L68,18 M42,50 L76,44 M42,72 L74,70 M42,94 L66,98"/>
    </g>
    <!-- Filled circle, upper-right of cluster -->
    <circle cx="278" cy="42" r="30" fill="#5EE7A2"/>
    <!-- Small filled square -->
    <rect x="270" y="98" width="36" height="36" fill="#1d5c3c"/>
    <!-- Outline ring, lower-left -->
    <circle cx="26" cy="296" r="26" fill="none" stroke="#2EC97D" stroke-width="7"/>
  </svg>

  <!-- TOP-RIGHT: geometric shapes, partially off screen right -->
  <svg class="rd rd-tr" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190 210">
    <!-- Large ring, bleeds off right edge -->
    <circle cx="158" cy="72" r="72" fill="none" stroke="#5EE7A2" stroke-width="11"/>
    <!-- Small filled square -->
    <rect x="10" y="12" width="40" height="40" fill="#2EC97D"/>
    <!-- Triangle -->
    <polygon points="16,116 62,116 39,80" fill="#5EE7A2"/>
    <!-- Small dark circle -->
    <circle cx="108" cy="186" r="18" fill="#1d5c3c"/>
  </svg>

  <!-- BOTTOM-LEFT: bold semicircle + small leaf + accent shapes -->
  <svg class="rd rd-bl" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 230">
    <!-- Large semicircle, dark green, bleeds off bottom -->
    <path fill="#1d5c3c" d="M10,230 A118,118 0 0 1 246,230Z"/>
    <!-- Small leaf above semicircle -->
    <g transform="translate(196,44) rotate(28, 40,58)">
      <path fill="#5EE7A2" d="M40,4 C62,4 76,24 76,58 C76,92 62,112 40,112 C18,112 4,92 4,58 C4,24 18,4 40,4Z"/>
      <line x1="40" y1="5" x2="40" y2="110" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.38"/>
      <path fill="none" stroke="white" stroke-width="1.6" opacity="0.28" stroke-linecap="round"
        d="M40,24 L18,16 M40,44 L8,38 M40,64 L10,62 M40,84 L20,88
           M40,24 L62,16 M40,44 L70,38 M40,64 L68,62 M40,84 L60,88"/>
    </g>
    <!-- Outline circle, right side -->
    <circle cx="268" cy="152" r="22" fill="none" stroke="#5EE7A2" stroke-width="6"/>
    <!-- Small square, far left -->
    <rect x="8" y="156" width="26" height="26" fill="#2EC97D"/>
  </svg>

  <!-- BOTTOM-RIGHT: leaf bleeds off corner + big outline ring + small shapes -->
  <svg class="rd rd-br" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 295">
    <!-- Leaf angled toward bottom-right, partially off screen -->
    <g transform="translate(52,30) rotate(40, 58,95)">
      <path fill="#2EC97D" d="M58,4 C90,4 112,38 112,95 C112,152 90,186 58,186 C26,186 4,152 4,95 C4,38 26,4 58,4Z"/>
      <line x1="58" y1="6" x2="58" y2="183" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.38"/>
      <path fill="none" stroke="white" stroke-width="1.8" opacity="0.28" stroke-linecap="round"
        d="M58,40 L20,26 M58,72 L7,62 M58,104 L9,100 M58,136 L24,142
           M58,40 L96,26 M58,72 L107,62 M58,104 L105,100 M58,136 L92,142"/>
    </g>
    <!-- Large outline ring, bleeds off bottom-right -->
    <circle cx="238" cy="268" r="62" fill="none" stroke="#5EE7A2" stroke-width="10"/>
    <!-- Small square, top-left area -->
    <rect x="12" y="16" width="28" height="28" fill="#5EE7A2"/>
    <!-- Small dark circle -->
    <circle cx="218" cy="36" r="15" fill="#1d5c3c"/>
  </svg>

  <!-- MID-RIGHT: scattered micro-shapes strip along right edge -->
  <svg class="rd rd-mid" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 260">
    <circle cx="22" cy="22" r="14" fill="none" stroke="#5EE7A2" stroke-width="5"/>
    <rect x="42" y="58" width="24" height="24" fill="#2EC97D"/>
    <circle cx="14" cy="110" r="11" fill="#5EE7A2"/>
    <polygon points="50,142 72,142 61,120" fill="#1d5c3c"/>
    <circle cx="26" cy="188" r="18" fill="none" stroke="#2EC97D" stroke-width="5"/>
    <rect x="8" y="232" width="20" height="20" fill="#5EE7A2"/>
  </svg>

</div>

<!-- ── Topbar ───────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-brand">
    <button class="burger" id="burger" title="Collapse sidebar" aria-label="Toggle sidebar">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6"  x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
      </div>
      <div>
        <div class="brand-name">ReptiMon</div>
        <div id="brand-version">v—</div>
      </div>
    </div>
  </div>

  <div class="topbar-body">
    <span class="mood" id="topbar-mood">Connecting…</span>
    <span id="topbar-ip" class="muted small"></span>
  </div>

  <div class="topbar-right">
    <div id="conn-chip" class="conn-chip" style="display:none"></div>
    <div id="ws-indicator" title="WebSocket" style="width:8px;height:8px;border-radius:50%;border:2px solid #000;background:#555;flex-shrink:0;"></div>
    <button class="icon-btn" id="themeToggle" title="Toggle dark mode" aria-label="Toggle dark mode">
      <svg id="theme-icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      <svg id="theme-icon-sun"  viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</header>

<!-- ── Sidebar ──────────────────────────────────────────────────── -->
<nav class="sidebar" id="sidebar">

  <div class="sb-section">Monitor</div>

  <button class="side-item active" data-tab="dashboard">
    <span class="sb-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></span>
    <span class="side-label">Dashboard</span>
  </button>

  <button class="side-item" data-tab="environment">
    <span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M12 2v6m0 0a4 4 0 100 8 4 4 0 000-8zm0 0V2"/><path d="M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span>
    <span class="side-label">Environment</span>
  </button>

  <button class="side-item" data-tab="camera">
    <span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></span>
    <span class="side-label">Camera</span>
  </button>

  <div class="sb-section">System</div>

  <button class="side-item" data-tab="network">
    <span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M1.42 9a16 16 0 0121.16 0M5 12.55a11 11 0 0114.08 0M10.54 17.1a6 6 0 012.92 0"/><circle cx="12" cy="21" r="1" fill="currentColor"/></svg></span>
    <span class="side-label">Network</span>
  </button>

  <button class="side-item" data-tab="updates">
    <span class="sb-icon"><svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg></span>
    <span class="side-label">Updates</span>
    <span id="sb-ota-dot" style="display:none;width:7px;height:7px;border-radius:50%;background:var(--warn);border:1px solid #A07308;margin-left:auto;"></span>
  </button>

  <button class="side-item" data-tab="settings">
    <span class="sb-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
    <span class="side-label">Settings</span>
  </button>

  <!-- Sidebar footer -->
  <div class="sb-footer">
    <div class="sb-stat"><strong>IP</strong> <span id="sb-ip">—</span></div>
    <div class="sb-stat"><strong>Host</strong> <span id="sb-host">—</span></div>
    <div class="sb-stat"><strong>Uptime</strong> <span id="sb-uptime">—</span></div>
  </div>
</nav>

<!-- ── App frame ─────────────────────────────────────────────────── -->
<div class="frame">
  <div class="mainrow">
    <div class="content">

      <!-- Tab panels -->
        <div id="panel-dashboard" class="panel active"></div>
        <div id="panel-environment" class="panel"></div>
        <div id="panel-camera" class="panel"></div>
        <div id="panel-network" class="panel"></div>
        <div id="panel-updates" class="panel"></div>
        <div id="panel-settings" class="panel"></div>

      </div>
    </div>
  </div>
</div>

<!-- ── Footer ────────────────────────────────────────────────────── -->
<footer class="footer">
  <strong>ReptiMon</strong>
  <span class="footer-sep">·</span>
  <span id="footer-version">v—</span>
  <span class="footer-sep">·</span>
  <span id="footer-ip">—</span>
  <span class="footer-sep">·</span>
  <span id="footer-uptime">—</span>
</footer>

<script src="/script.js"></script>
</body>
</html>
