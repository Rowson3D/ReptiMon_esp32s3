<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReptiMon — WiFi Setup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      padding: 0 !important;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px
      ), repeating-linear-gradient(
        90deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px
      );
    }

    .portal-wrap {
      width: min(92vw, 440px);
      margin: 24px auto;
    }

    .portal-card {
      background: var(--white);
      border: var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }

    .portal-header {
      background: var(--sb-bg);
      padding: 28px 28px 24px;
      border-bottom: var(--border);
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
    }

    .portal-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .portal-mark {
      width: 44px; height: 44px;
      background: var(--accent);
      border: var(--border);
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow);
    }

    .portal-mark svg {
      width: 24px; height: 24px;
      stroke: #000; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }

    .portal-title {
      font-size: 22px; font-weight: 900;
      color: #F9FAFB;
      letter-spacing: -.5px;
    }

    .portal-sub {
      font-size: 13px;
      color: var(--sb-tx);
      font-weight: 500;
    }

    .portal-body {
      padding: 24px 28px;
    }

    .portal-step {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .7px;
      color: var(--accent-dk);
      margin-bottom: 14px;
    }

    .scan-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .scan-label {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--tx-2);
    }

    #portal-net-list {
      min-height: 52px;
      margin-bottom: 16px;
    }

    .portal-empty {
      border: 2px dashed var(--cream-2);
      border-radius: var(--r-sm);
      padding: 20px;
      text-align: center;
      color: var(--tx-3);
      font-size: 12px;
    }

    .portal-net-item {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px;
      border: var(--border);
      border-radius: var(--r-sm);
      background: var(--white);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      margin-bottom: 6px;
      transition: transform .08s, box-shadow .08s;
    }
    .portal-net-item:last-child { margin-bottom: 0; }
    .portal-net-item:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 #000; }
    .portal-net-item.selected { border-color: var(--accent-dk); background: var(--accent-bg); box-shadow: 2px 2px 0 var(--accent-dk); }
    .portal-net-item .pni-name { flex: 1; font-size: 13px; font-weight: 700; }
    .portal-net-item .pni-meta { font-size: 11px; color: var(--tx-3); display: flex; align-items: center; gap: 6px; }

    .portal-status {
      margin-top: 16px;
      padding: 12px 16px;
      border: var(--border);
      border-radius: var(--r-sm);
      font-size: 13px; font-weight: 600;
      display: flex; align-items: center; gap: 10px;
    }
    .portal-status.connecting { background: var(--info-bg); border-color: #1E88C8; }
    .portal-status.success    { background: var(--accent-bg); border-color: var(--accent-dk); color: #0A6640; }
    .portal-status.failed     { background: var(--danger-bg); border-color: var(--danger); color: #8B1A1A; }
  </style>
</head>
<body>

<div class="portal-wrap">
  <div class="portal-card">
    <!-- Header -->
    <div class="portal-header">
      <div class="portal-brand">
        <div class="portal-mark">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
        </div>
        <div>
          <div class="portal-title">ReptiMon</div>
          <div class="portal-sub">WiFi Setup</div>
        </div>
      </div>
    </div>

    <!-- Body -->
    <div class="portal-body">
      <div class="portal-step">Step 1 — Select your network</div>

      <div class="scan-row">
        <span class="scan-label">Available Networks</span>
        <button class="btn sm" id="scan-btn" onclick="Portal.scan()">Scan</button>
      </div>

      <div id="portal-net-list">
        <div class="portal-empty">Press Scan to discover nearby networks.</div>
      </div>

      <!-- Password form -->
      <div id="portal-connect-form" style="display:none">
        <div class="sep"></div>
        <div class="portal-step" style="margin-top:16px">Step 2 — Enter password</div>

        <div class="form-group">
          <label class="form-label">Network</label>
          <input type="text" class="form-control" id="portal-ssid" readonly>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="portal-pass" placeholder="WiFi password" autocomplete="off">
        </div>
        <div class="actions">
          <button class="btn primary" id="portal-join-btn" onclick="Portal.connect()" style="flex:1;justify-content:center">
            Connect
          </button>
          <button class="btn ghost" onclick="Portal.cancel()">Cancel</button>
        </div>
      </div>

      <!-- Status -->
      <div id="portal-status" style="display:none" class="portal-status">
        <span id="portal-status-icon"></span>
        <span id="portal-status-msg"></span>
      </div>
    </div>
  </div>

  <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--tx-3)">
    ReptiMon · Connect once, access from anywhere on your network
  </div>
</div>

<script>
(function () {
  const WS_URL = `ws://${location.host}/ws`;
  let ws, scanPoll;

  // WebSocket just for wifi events
  function connectWs() {
    ws = new WebSocket(WS_URL);
    ws.onmessage = ({ data }) => {
      try {
        const msg = JSON.parse(data);
        if (msg.event === 'wifi_connected') {
          showStatus('success', `✓ Connected to ${msg.ssid || 'network'} — IP: ${msg.ip}`);
          setTimeout(() => { location.href = '/'; }, 3000);
        } else if (msg.event === 'wifi_failed') {
          showStatus('failed', `✗ Connection failed: ${msg.reason || 'timeout'}. Try again.`);
          const btn = document.getElementById('portal-join-btn');
          if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
        }
      } catch {}
    };
    ws.onclose = () => setTimeout(connectWs, 2000);
    ws.onerror = () => {};
  }

  function showStatus(type, msg) {
    const el = document.getElementById('portal-status');
    const icon = document.getElementById('portal-status-icon');
    const msgEl = document.getElementById('portal-status-msg');
    if (!el) return;
    el.className = `portal-status ${type}`;
    el.style.display = 'flex';
    if (icon) icon.textContent = type === 'connecting' ? '⟳' : type === 'success' ? '✓' : '✗';
    if (msgEl) msgEl.textContent = msg;
  }

  function renderNetList(nets) {
    const list = document.getElementById('portal-net-list');
    if (!list) return;
    if (!nets || nets.length === 0) {
      list.innerHTML = '<div class="portal-empty">No networks found. Try scanning again.</div>';
      return;
    }
    list.innerHTML = nets.map(n => `
      <div class="portal-net-item" onclick="Portal._select(this,'${n.ssid.replace(/'/g,"\\'")}','${n.security||''}')">
        <span class="pni-name">${n.ssid || '(hidden)'}</span>
        <span class="pni-meta">
          <span>${App_rssiDots(n.rssi)}</span>
          <span>${n.rssi} dBm</span>
          ${n.security && n.security !== 'open' ? '<span>🔒</span>' : ''}
        </span>
      </div>`).join('');
  }

  function App_rssiDots(rssi) {
    const s = rssi == null ? 0 : rssi > -55 ? 4 : rssi > -67 ? 3 : rssi > -78 ? 2 : 1;
    return [1,2,3,4].map(i => `<span style="display:inline-block;width:5px;height:5px;border-radius:50%;border:1px solid #000;margin-right:2px;background:${i<=s?'#2EC97D':'#F5F0E8'}"></span>`).join('');
  }

  window.Portal = {
    async scan() {
      const btn = document.getElementById('scan-btn');
      const list = document.getElementById('portal-net-list');
      if (btn) { btn.classList.add('loading'); btn.disabled = true; }
      if (list) list.innerHTML = '<div class="portal-empty">Scanning…</div>';

      try {
        await fetch('/api/wifi/scan/start');
        clearInterval(scanPoll);
        let tries = 0;
        scanPoll = setInterval(async () => {
          tries++;
          try {
            const r = await fetch('/api/wifi/scan/results');
            const nets = await r.json();
            if (nets && nets.length > 0) {
              clearInterval(scanPoll);
              renderNetList(nets);
              if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
            } else if (tries > 12) {
              clearInterval(scanPoll);
              renderNetList([]);
              if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
            }
          } catch {}
        }, 1000);
      } catch {
        if (list) list.innerHTML = '<div class="portal-empty">Scan failed. Is the device in range?</div>';
        if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
      }
    },

    _select(el, ssid, security) {
      document.querySelectorAll('.portal-net-item').forEach(n => n.classList.remove('selected'));
      el.classList.add('selected');
      const ssidIn = document.getElementById('portal-ssid');
      const passIn = document.getElementById('portal-pass');
      const form   = document.getElementById('portal-connect-form');
      if (ssidIn) ssidIn.value = ssid;
      if (passIn) { passIn.value = ''; if (security && security !== 'open') passIn.focus(); }
      if (form)  form.style.display = '';
      const status = document.getElementById('portal-status');
      if (status) status.style.display = 'none';
    },

    async connect() {
      const ssid = document.getElementById('portal-ssid')?.value;
      const pass = document.getElementById('portal-pass')?.value;
      if (!ssid) return;

      const btn = document.getElementById('portal-join-btn');
      if (btn) { btn.classList.add('loading'); btn.disabled = true; }
      showStatus('connecting', `Connecting to "${ssid}"…`);

      try {
        await fetch('/api/wifi/connect', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ssid, password: pass }),
        });
        // WS will fire wifi_connected or wifi_failed
      } catch {
        showStatus('failed', 'Connection request failed. Try again.');
        if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
      }
    },

    cancel() {
      document.getElementById('portal-connect-form').style.display = 'none';
      document.getElementById('portal-status').style.display = 'none';
      document.querySelectorAll('.portal-net-item').forEach(n => n.classList.remove('selected'));
    }
  };

  // Boot
  connectWs();
  // Auto-scan on load
  setTimeout(Portal.scan, 400);
})();
</script>
</body>
</html>
