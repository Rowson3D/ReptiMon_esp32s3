<!-- Dashboard component -->
<div class="page-head">
  <div>
    <div class="page-kicker">ReptiMon</div>
    <div class="page-title">Dashboard</div>
  </div>
  <div class="actions">
    <button class="btn sm" onclick="App.apiGet('/api/camera/snapshot').then(()=>{}).catch(()=>{}); Dash.snapshot()">Snapshot</button>
    <button class="btn sm" id="dash-reboot-btn" onclick="Dash.reboot()">Reboot</button>
    <span id="dash-ota-badge" style="display:none">
      <button class="btn sm warn" onclick="App.navigate('updates')">Update Available</button>
    </span>
  </div>
</div>

<!-- Primary metric tiles — Temp + Humidity -->
<div class="grid-2 mb-16" id="dash-primary">
  <div class="metric-tile accent-tile" id="dash-temp-tile">
    <div class="mt-label">Temperature</div>
    <div class="mt-value"><span id="dash-temp">—</span><span class="mt-unit" id="dash-temp-unit">°C</span></div>
    <div class="mt-sub" id="dash-temp-status">—</div>
    <div class="mt-thresh" id="dash-temp-thresh" style="display:none">
      <div class="mt-thresh-bar">
        <div class="mt-thresh-zone" id="dash-temp-zone"></div>
        <div class="mt-thresh-dot" id="dash-temp-dot"></div>
      </div>
      <div class="mt-thresh-labels">
        <span id="dash-temp-tlo">—</span>
        <span id="dash-temp-thi">—</span>
      </div>
    </div>
  </div>
  <div class="metric-tile accent-tile" id="dash-hum-tile">
    <div class="mt-label">Humidity</div>
    <div class="mt-value"><span id="dash-hum">—</span><span class="mt-unit">%</span></div>
    <div class="mt-sub" id="dash-hum-status">—</div>
    <div class="mt-thresh" id="dash-hum-thresh" style="display:none">
      <div class="mt-thresh-bar">
        <div class="mt-thresh-zone" id="dash-hum-zone"></div>
        <div class="mt-thresh-dot" id="dash-hum-dot"></div>
      </div>
      <div class="mt-thresh-labels">
        <span id="dash-hum-tlo">—</span>
        <span id="dash-hum-thi">—</span>
      </div>
    </div>
  </div>
</div>

<!-- Secondary metrics — 4-wide grid -->
<div class="grid-4 mb-16">
  <div class="metric-sm">
    <div class="ms-label">Dew Point</div>
    <div class="ms-value"><span id="dash-dew">—</span><span class="ms-unit" id="dash-dew-unit">°C</span></div>
  </div>
  <div class="metric-sm">
    <div class="ms-label">Heat Index</div>
    <div class="ms-value"><span id="dash-hi">—</span><span class="ms-unit" id="dash-hi-unit">°C</span></div>
  </div>
  <div class="metric-sm">
    <div class="ms-label">VPD</div>
    <div class="ms-value"><span id="dash-vpd">—</span><span class="ms-unit">kPa</span></div>
  </div>
  <div class="metric-sm">
    <div class="ms-label">Abs. Humidity</div>
    <div class="ms-value"><span id="dash-abshum">—</span><span class="ms-unit">g/m³</span></div>
  </div>
</div>

<!-- Live Sparklines -->
<div class="grid-2 mb-16">
  <div class="spark-card">
    <div class="spark-head">
      <div class="spark-title">
        <span class="spark-label">Temperature</span>
        <span class="spark-range" id="dash-tc-range"></span>
      </div>
      <div class="spark-ctrls">
        <button class="btn sm" id="dash-tc-auto" onclick="Dash.toggleAuto('t')" title="Toggle auto/fixed Y axis">Auto</button>
        <button class="btn sm" id="dash-tc-w30" onclick="Dash.setWindow('t',30)">30s</button>
        <button class="btn sm primary" id="dash-tc-w60" onclick="Dash.setWindow('t',60)">60s</button>
      </div>
    </div>
    <canvas id="dash-temp-spark" height="160"></canvas>
  </div>
  <div class="spark-card">
    <div class="spark-head">
      <div class="spark-title">
        <span class="spark-label">Humidity</span>
        <span class="spark-range" id="dash-hc-range"></span>
      </div>
      <div class="spark-ctrls">
        <button class="btn sm" id="dash-hc-auto" onclick="Dash.toggleAuto('h')" title="Toggle auto/fixed Y axis">Auto</button>
        <button class="btn sm" id="dash-hc-w30" onclick="Dash.setWindow('h',30)">30s</button>
        <button class="btn sm primary" id="dash-hc-w60" onclick="Dash.setWindow('h',60)">60s</button>
      </div>
    </div>
    <canvas id="dash-hum-spark" height="160"></canvas>
  </div>
</div>

<!-- System health bar -->
<div class="card mb-16">
  <div class="card-head">System Status</div>
  <div class="card-body">
    <div class="stat-strip">
      <div class="stat-item"><div class="si-key">Uptime</div><div class="si-val" id="dash-uptime">—</div></div>
      <div class="stat-item"><div class="si-key">IP Address</div><div class="si-val mono" id="dash-ip">—</div></div>
      <div class="stat-item"><div class="si-key">Hostname</div><div class="si-val" id="dash-host">—</div></div>
      <div class="stat-item"><div class="si-key">Signal</div><div class="si-val" id="dash-rssi">—</div></div>
      <div class="stat-item"><div class="si-key">Firmware</div><div class="si-val mono" id="dash-fw">—</div></div>
      <div class="stat-item"><div class="si-key">Sensor</div><div class="si-val" id="dash-sensor-status">—</div></div>
    </div>
  </div>
</div>

<script>
(function () {
  const statusTileClass = { normal:'accent-tile', ok:'accent-tile', perfect:'accent-tile', high:'warn-tile', low:'warn-tile', 'too cold':'warn-tile', 'too hot':'warn-tile', 'too dry':'warn-tile', 'too wet':'warn-tile', critical:'danger-tile' };

  function computeTempStatus(temp, lo, hi) {
    if (temp == null || lo == null || hi == null) return 'ok';
    if (temp < lo) return 'too cold';
    if (temp > hi) return 'too hot';
    return 'perfect';
  }
  function computeHumStatus(hum, lo, hi) {
    if (hum == null || lo == null || hi == null) return 'ok';
    if (hum < lo) return 'too dry';
    if (hum > hi) return 'too wet';
    return 'perfect';
  }

  /* ── History ring buffers (accumulated globally in script.js WS handler) ── */
  const HIST_MAX = 60;
  if (!App.State._tHist) App.State._tHist = [];
  if (!App.State._hHist) App.State._hHist = [];

  // Chart options (persist across refreshes) — separate window per chart
  if (!App.State._sparkOpts) App.State._sparkOpts = { tWindow: 60, hWindow: 60, tAuto: true, hAuto: true };
  const opts = App.State._sparkOpts;

  function syncSparkBtns() {
    const ta  = document.getElementById('dash-tc-auto');
    const ha  = document.getElementById('dash-hc-auto');
    const tb30 = document.getElementById('dash-tc-w30');
    const tb60 = document.getElementById('dash-tc-w60');
    const hb30 = document.getElementById('dash-hc-w30');
    const hb60 = document.getElementById('dash-hc-w60');
    if (ta)   ta.className   = `btn sm${opts.tAuto   ? ' primary' : ''}`;
    if (ha)   ha.className   = `btn sm${opts.hAuto   ? ' primary' : ''}`;
    if (tb30) tb30.className = `btn sm${opts.tWindow === 30 ? ' primary' : ''}`;
    if (tb60) tb60.className = `btn sm${opts.tWindow === 60 ? ' primary' : ''}`;
    if (hb30) hb30.className = `btn sm${opts.hWindow === 30 ? ' primary' : ''}`;
    if (hb60) hb60.className = `btn sm${opts.hWindow === 60 ? ' primary' : ''}`;
  }

  /* ── Sparkline renderer ───────────────────────────────────────── */
  function drawSpark(canvasId, data, color, rangeId, suffix, autoScale, fixedLo, fixedHi, win, threshLo, threshHi) {
    const canvas = document.getElementById(canvasId);
    if (!canvas) return;
    canvas.width = canvas.parentElement.clientWidth;
    const W = canvas.width, H = canvas.height;
    const ctx = canvas.getContext('2d');
    const slice = data.slice(-win);

    // Light background
    ctx.fillStyle = '#fff';
    ctx.fillRect(0, 0, W, H);

    if (slice.length < 2) {
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.font = '700 11px Inter,system-ui,sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Collecting data…', W / 2, H / 2 + 4);
      return;
    }

    const PL = 6, PR = 6, PT = 8, PB = 8;
    const w = W - PL - PR, h = H - PT - PB;

    let lo, hi;
    if (autoScale) {
      if (threshLo != null && threshHi != null) {
        // Default: anchor Y axis to threshold range + padding (fixedLo/Hi already have padding applied)
        const pad = Math.max((threshHi - threshLo) * 0.25, 1);
        lo = fixedLo ?? (threshLo - pad);
        hi = fixedHi ?? (threshHi + pad);
        // Expand to fit any data that exceeds the threshold range
        const dLo = Math.min(...slice), dHi = Math.max(...slice);
        if (dLo < lo) lo = dLo - pad;
        if (dHi > hi) hi = dHi + pad;
      } else {
        // No thresholds — pure data-range auto
        lo = Math.min(...slice); hi = Math.max(...slice);
        const pad = Math.max((hi - lo) * 0.2, 0.5);
        lo -= pad; hi += pad;
      }
    } else {
      lo = fixedLo; hi = fixedHi;
    }

    const toX = i => PL + (i / (win - 1)) * w;
    const toY = v => PT + (1 - (v - lo) / (hi - lo)) * h;

    // Subtle grid lines
    ctx.strokeStyle = 'rgba(0,0,0,0.06)';
    ctx.lineWidth = 1;
    [0, 1, 2, 3].forEach(i => {
      const y = Math.round(PT + h * (i / 3));
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    });

    // Threshold band (values already converted to correct units by caller)
    if (threshLo != null && threshHi != null) {
      const yLo = toY(threshLo), yHi = toY(threshHi);
      ctx.fillStyle = suffix.includes('%') ? 'rgba(77,195,255,0.12)' : 'rgba(94,231,162,0.14)';
      ctx.fillRect(PL, Math.min(yLo, yHi), w, Math.abs(yLo - yHi));
      // Threshold lines
      ctx.save();
      ctx.setLineDash([4, 4]);
      ctx.strokeStyle = suffix.includes('%') ? 'rgba(30,136,200,0.35)' : 'rgba(46,201,125,0.45)';
      ctx.lineWidth = 1;
      [yLo, yHi].forEach(y => { ctx.beginPath(); ctx.moveTo(PL, y); ctx.lineTo(PL + w, y); ctx.stroke(); });
      ctx.restore();
    }

    // Area fill
    const grad = ctx.createLinearGradient(0, PT, 0, H - PB);
    grad.addColorStop(0, color + '28');
    grad.addColorStop(1, color + '04');
    ctx.beginPath();
    slice.forEach((v, i) => {
      const x = toX(i), y = toY(v);
      if (i === 0) { ctx.moveTo(x, H - PB); ctx.lineTo(x, y); }
      else ctx.lineTo(x, y);
    });
    ctx.lineTo(toX(slice.length - 1), H - PB);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    // Stroke
    ctx.beginPath();
    slice.forEach((v, i) => { const x = toX(i), y = toY(v); i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap  = 'round';
    ctx.stroke();

    // End dot
    const lx = toX(slice.length - 1), ly = toY(slice[slice.length - 1]);
    ctx.beginPath(); ctx.arc(lx, ly, 6, 0, Math.PI * 2);
    ctx.fillStyle = color + '28'; ctx.fill();
    ctx.beginPath(); ctx.arc(lx, ly, 3.5, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.stroke();

    // Range label
    const rangeEl = document.getElementById(rangeId);
    if (rangeEl) {
      const mn = Math.min(...slice).toFixed(1), mx = Math.max(...slice).toFixed(1);
      rangeEl.textContent = `${mn}–${mx}${suffix}`;
    }
  }

  function drawCharts(d, u) {
    const ts = `\u00b0${u}`;
    const th = d?.thresholds;
    const isF = u === 'F';
    // Thresholds from firmware are always in °C — convert to display unit for correct band position
    const c2f = v => v * 9 / 5 + 32;
    const tMin = th?.tempMin != null ? (isF ? c2f(th.tempMin) : th.tempMin) : null;
    const tMax = th?.tempMax != null ? (isF ? c2f(th.tempMax) : th.tempMax) : null;
    // Fixed fallback ranges also in display unit
    const tLo = (tMin ?? (isF ? 64 : 18)) - (isF ? 7 : 4);
    const tHi = (tMax ?? (isF ? 97 : 36)) + (isF ? 7 : 4);
    const hMin = th?.humMin ?? null;
    const hMax = th?.humMax ?? null;
    const hLo = hMin != null ? hMin - 8 : 20;
    const hHi = hMax != null ? hMax + 8 : 100;
    drawSpark('dash-temp-spark', App.State._tHist, '#2EC97D', 'dash-tc-range', ts,  opts.tAuto, tLo, tHi, opts.tWindow, tMin, tMax);
    drawSpark('dash-hum-spark',  App.State._hHist, '#1E88C8', 'dash-hc-range', '%', opts.hAuto, hLo, hHi, opts.hWindow, hMin, hMax);
    syncSparkBtns();
  }

  /* ── Threshold range bar updater ───────────────────────────────── */
  function updateThreshBar(prefix, current, lo, hi, suffix) {
    const wrap = document.getElementById(`${prefix}-thresh`);
    if (!wrap) return;
    if (lo == null || hi == null || current == null) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    const pad  = Math.max((hi - lo) * 0.35, 2);
    const rLo  = lo - pad, rHi = hi + pad, rSpan = rHi - rLo;
    const zonePct = v => Math.max(0, Math.min(100, ((v - rLo) / rSpan) * 100));
    const zL = zonePct(lo), zR = zonePct(hi);
    const dot = zonePct(current);
    const zone = document.getElementById(`${prefix}-zone`);
    const dotEl = document.getElementById(`${prefix}-dot`);
    if (zone)  { zone.style.left = `${zL}%`; zone.style.width = `${zR - zL}%`; }
    if (dotEl) dotEl.style.left = `${dot}%`;
    const loEl = document.getElementById(`${prefix}-tlo`);
    const hiEl = document.getElementById(`${prefix}-thi`);
    if (loEl) loEl.textContent = `▼ ${App.fmt(lo)}${suffix}`;
    if (hiEl) hiEl.textContent = `▲ ${App.fmt(hi)}${suffix}`;
    // Colour the dot based on whether value is in range
    if (dotEl) dotEl.style.background = (current >= lo && current <= hi) ? 'var(--accent)' : 'var(--danger)';
  }

  /* ── Main refresh ─────────────────────────────────────────────── */
  function refresh() {
    const d   = App.State.data;
    const sys = d.system || {};
    const u   = App.State.units;

    // Primary tiles
    App.setText('dash-temp', App.fmt(d.temperature));
    App.setText('dash-hum',  App.fmt(d.humidity));
    App.setHTML('dash-temp-unit', `°${u}`);
    App.setHTML('dash-dew-unit',  `°${u}`);
    App.setHTML('dash-hi-unit',   `°${u}`);
    // Threshold bars — thresholds always in °C from firmware, convert if °F
    const th = d.thresholds || {};
    const isF = u === 'F';
    const c2f = v => v * 9 / 5 + 32;
    const tLo = th.tempMin != null ? (isF ? c2f(th.tempMin) : th.tempMin) : null;
    const tHi = th.tempMax != null ? (isF ? c2f(th.tempMax) : th.tempMax) : null;
    updateThreshBar('dash-temp', d.temperature, tLo, tHi, `°${u}`);
    updateThreshBar('dash-hum',  d.humidity, th.humMin ?? null, th.humMax ?? null, '%');

    // Compute status client-side from already-converted thresholds (avoids firmware unit bug)
    const tStatus = computeTempStatus(d.temperature, tLo, tHi);
    const hStatus = computeHumStatus(d.humidity, th.humMin ?? null, th.humMax ?? null);
    App.setHTML('dash-temp-status', App.statusBadge(tStatus));
    App.setHTML('dash-hum-status',  App.statusBadge(hStatus));

    const tTile = document.getElementById('dash-temp-tile');
    const hTile = document.getElementById('dash-hum-tile');
    if (tTile) tTile.className = `metric-tile ${statusTileClass[tStatus] || 'accent-tile'}`;
    if (hTile) hTile.className = `metric-tile ${statusTileClass[hStatus] || 'accent-tile'}`;

    // Secondary
    App.setText('dash-dew',    App.fmt(d.dewPoint));
    App.setText('dash-hi',     App.fmt(d.heatIndex));
    App.setText('dash-vpd',    App.fmt(d.vpd, 3));
    App.setText('dash-abshum', App.fmt(d.absoluteHumidity, 1));

    // System
    App.setText('dash-uptime', App.fmtUptime(sys.uptime));
    App.setText('dash-ip',     sys.ip       || '—');
    App.setText('dash-host',   sys.hostname ? sys.hostname + '.local' : '—');
    App.setHTML('dash-rssi',   sys.rssi != null ? `${sys.rssi} dBm ${App.rssiDots(sys.rssi)}` : '—');
    App.setText('dash-fw',     sys.version  || '—');
    App.setHTML('dash-sensor-status', App.statusBadge(d.valid ? 'ok' : 'critical'));

    // OTA badge
    const otaBadge = document.getElementById('dash-ota-badge');
    if (otaBadge) otaBadge.style.display = App.State.ota?.hasUpdate ? '' : 'none';

    // Charts
    drawCharts(d, u);
  }

  window.Dash = {
    refresh,
    toggleAuto(which) {
      if (which === 't') opts.tAuto = !opts.tAuto;
      else               opts.hAuto = !opts.hAuto;
      drawCharts(App.State.data, App.State.units);
    },
    setWindow(which, n) {
      if (which === 't') opts.tWindow = n;
      else               opts.hWindow = n;
      drawCharts(App.State.data, App.State.units);
    },
    snapshot() {
      const link = document.createElement('a');
      link.href = '/api/camera/snapshot';
      link.download = `reptmon-${Date.now()}.jpg`;
      link.click();
    },
    async reboot() {
      const btn = document.getElementById('dash-reboot-btn');
      if (!confirm('Reboot the device?')) return;
      if (btn) { btn.classList.add('loading'); btn.disabled = true; }
      try {
        await App.apiPost('/api/system/reboot');
        App.showToast('Rebooting…', 'warn', 6000);
      } catch {
        App.showToast('Reboot failed', 'danger');
      } finally {
        if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
      }
    }
  };

  if (typeof Tabs !== 'undefined') Tabs.register('dashboard', refresh);
  refresh();
})();
</script>
