<!-- Camera component -->
<div class="cam-page">
<div class="page-head">
  <div>
    <div class="page-kicker">OV3660</div>
    <div class="page-title">Camera</div>
  </div>
</div>

<div class="cam-grid">
  <!-- Live feed -->
  <div>
    <div class="cam-wrap" id="cam-wrap">
      <canvas id="cam-canvas"></canvas>
      <div class="cam-offline" id="cam-offline">
        <span>Camera offline</span>
      </div>
      <div class="cam-stats-overlay" id="cam-stats"></div>
    </div>
    <div class="flex mt-8" style="gap:16px;font-size:11px;color:var(--tx-3)">
      <span id="cam-stats-sub">&nbsp;</span>
    </div>
  </div>

  <!-- Controls column -->
  <div style="display:flex;flex-direction:column;">

  <!-- Controls panel with attached action bar at top -->
  <div class="card" style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;">
    <div class="cam-actions">
      <button class="btn sm" onclick="Cam.snapshot()">Snapshot</button>
      <button class="btn sm" onclick="Cam.snapshotFull()">Full-res</button>
      <button class="btn sm" id="cam-restart-btn" onclick="Cam.restart()">Restart</button>
    </div>
    <div class="card-head">Controls</div>
    <div class="cam-ctrl-scroll">

    <!-- Image settings -->
    <div class="cam-ctrl-group">
      <div class="cg-title">Image</div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">Frame Size</span>
        <select id="cam-framesize" onchange="">
          <option value="5">QVGA 320×240</option>
          <option value="8" selected>VGA 640×480</option>
          <option value="9">SVGA 800×600</option>
          <option value="10">XGA 1024×768</option>
          <option value="13">UXGA 1600×1200</option>
        </select>
      </div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">Quality</span>
        <input type="range" id="cam-quality" min="4" max="63" value="15" oninput="App.setText('cam-quality-val',this.value)" onchange="Cam.ctrl('quality',this.value)">
        <span id="cam-quality-val" style="font-size:11px;min-width:20px;text-align:right">15</span>
      </div>
    </div>

    <!-- Adjustments -->
    <div class="cam-ctrl-group">
      <div class="cg-title">Adjustments</div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">Brightness</span>
        <input type="range" id="cam-brightness" min="-2" max="2" value="0" onchange="Cam.ctrl('brightness',this.value)">
        <span id="cam-brightness-val" style="font-size:11px;min-width:20px;text-align:right">0</span>
      </div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">Contrast</span>
        <input type="range" id="cam-contrast" min="-2" max="2" value="0" onchange="Cam.ctrl('contrast',this.value)">
        <span id="cam-contrast-val" style="font-size:11px;min-width:20px;text-align:right">0</span>
      </div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">Saturation</span>
        <input type="range" id="cam-saturation" min="-2" max="2" value="0" onchange="Cam.ctrl('saturation',this.value)">
        <span id="cam-saturation-val" style="font-size:11px;min-width:20px;text-align:right">0</span>
      </div>
    </div>

    <!-- Flip / mirror -->
    <div class="cam-ctrl-group">
      <div class="cg-title">Orientation</div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">H-Mirror</span>
        <label class="toggle"><input type="checkbox" id="cam-hmirror" onchange="Cam.ctrl('hmirror',this.checked?1:0)"><span class="toggle-track"></span></label>
      </div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">V-Flip</span>
        <label class="toggle"><input type="checkbox" id="cam-vflip" onchange="Cam.ctrl('vflip',this.checked?1:0)"><span class="toggle-track"></span></label>
      </div>
    </div>

    <!-- White balance -->
    <div class="cam-ctrl-group">
      <div class="cg-title">White Balance</div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">Mode</span>
        <select id="cam-wb" onchange="Cam.ctrl('wb_mode',this.value)">
          <option value="0">Auto</option>
          <option value="1">Sunny</option>
          <option value="2">Cloudy</option>
          <option value="3">Office</option>
          <option value="4">Home</option>
        </select>
      </div>
    </div>

    <!-- Special effects -->
    <div class="cam-ctrl-group">
      <div class="cg-title">Special</div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">Effect</span>
        <select id="cam-special" onchange="Cam.ctrl('special',this.value)">
          <option value="0">None</option>
          <option value="1">Negative</option>
          <option value="2">Grayscale</option>
          <option value="3">Red Tint</option>
          <option value="4">Green Tint</option>
          <option value="5">Blue Tint</option>
          <option value="6">Sepia</option>
        </select>
      </div>
      <div class="cam-ctrl-row">
        <span class="ccr-label">Colorbar</span>
        <label class="toggle"><input type="checkbox" id="cam-colorbar" onchange="Cam.ctrl('colorbar',this.checked?1:0)"><span class="toggle-track"></span></label>
      </div>
    </div>

    <!-- Presets -->
    <div class="cam-ctrl-group">
      <div class="cg-title">Presets</div>
      <div class="cam-ctrl-row" style="gap:6px;flex-wrap:wrap;">
        <select id="cam-preset-sel" style="flex:1;min-width:0;"></select>
        <button class="btn sm" onclick="Cam.loadPreset()">Load</button>
        <button class="btn sm" onclick="Cam.deletePreset()">Del</button>
      </div>
      <div class="cam-ctrl-row" style="gap:6px;">
        <input id="cam-preset-name" placeholder="Preset name…" style="flex:1;min-width:0;font:inherit;font-size:12px;padding:4px 8px;border:var(--border);border-radius:var(--r-sm);background:var(--white);">
        <button class="btn sm" onclick="Cam.savePreset()">Save as</button>
      </div>
    </div>

    <!-- Save to device -->
    <div class="cam-ctrl-group">
      <button class="btn" style="width:100%;" id="cam-save-btn" onclick="Cam.saveAll()">Save Settings to Device</button>
    </div>

    </div><!-- end cam-ctrl-scroll -->
  </div>
  </div><!-- end controls column -->
</div><!-- end cam-grid -->
</div><!-- end cam-page -->

<script>
(function () {
  let camCanvas, statsTimer, _prevStatFrames = 0, _prevStatTime = 0;
  const PRESETS_KEY = 'reptmon_cam_presets';

  function readControls() {
    const iv = id => { const e = document.getElementById(id); return e ? Number(e.value) : null; };
    const bv = id => { const e = document.getElementById(id); return e ? e.checked : false; };
    return {
      frameSize:  iv('cam-framesize'),
      quality:    iv('cam-quality'),
      brightness: iv('cam-brightness'),
      contrast:   iv('cam-contrast'),
      saturation: iv('cam-saturation'),
      wbMode:     iv('cam-wb'),
      special:    iv('cam-special'),
      hmirror:    bv('cam-hmirror'),
      vflip:      bv('cam-vflip'),
      colorbar:   bv('cam-colorbar'),
    };
  }

  function applyToUI(c) {
    const set = (id, val) => { const e = document.getElementById(id); if (e && val != null) e.value = val; };
    const setb = (id, val) => { const e = document.getElementById(id); if (e && val != null) e.checked = !!val; };
    set('cam-framesize',  c.frameSize);
    set('cam-quality',    c.quality);   App.setText('cam-quality-val',    c.quality ?? '');
    set('cam-brightness', c.brightness); App.setText('cam-brightness-val', c.brightness ?? '');
    set('cam-contrast',   c.contrast);  App.setText('cam-contrast-val',   c.contrast ?? '');
    set('cam-saturation', c.saturation); App.setText('cam-saturation-val', c.saturation ?? '');
    set('cam-wb',         c.wbMode ?? c.wb_mode);
    set('cam-special',    c.special);
    setb('cam-hmirror',   c.hmirror);
    setb('cam-vflip',     c.vflip);
    setb('cam-colorbar',  c.colorbar);
  }

  function getPresets() {
    try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || '{}'); } catch { return {}; }
  }
  function savePresets(p) { localStorage.setItem(PRESETS_KEY, JSON.stringify(p)); }
  function refreshPresetList() {
    const sel = document.getElementById('cam-preset-sel');
    if (!sel) return;
    const p = getPresets();
    const keys = Object.keys(p);
    sel.innerHTML = keys.length
      ? keys.map(k => `<option value="${k}">${k}</option>`).join('')
      : '<option value="" disabled>No presets saved</option>';
  }

  function init() {
    camCanvas = document.getElementById('cam-canvas');
    const offline = document.getElementById('cam-offline');

    if (camCanvas && App.CamWS) {
      App.CamWS.addConsumer(camCanvas);
      App.CamWS.connect();
      if (offline) offline.style.display = 'none';
    }

    // Live label sync for sliders
    ['brightness','contrast','saturation'].forEach(k => {
      const sl = document.getElementById(`cam-${k}`);
      if (sl) sl.addEventListener('input', () => App.setText(`cam-${k}-val`, sl.value));
    });
    const q = document.getElementById('cam-quality');
    if (q) q.addEventListener('input', () => App.setText('cam-quality-val', q.value));

    // Load all persisted settings from device
    App.apiGet('/api/settings/get').then(s => {
      if (s.camera) applyToUI(s.camera);
    }).catch(()=>{});

    refreshPresetList();
    statsTimer = setInterval(updateStats, 2000);
    updateStats();
  }

  async function updateStats() {
    try {
      const now = Date.now();
      const s = await App.apiGet('/api/camera/stream_stats');
      const overlay = document.getElementById('cam-stats');
      if (overlay && s) {
        const elapsed = (now - _prevStatTime) / 1000;
        const frameDelta = s.frames - _prevStatFrames;
        const fps = (_prevStatTime > 0 && elapsed > 0 && frameDelta >= 0)
          ? (frameDelta / elapsed).toFixed(1)
          : '—';
        _prevStatFrames = s.frames;
        _prevStatTime   = now;
        overlay.textContent = `${fps} fps · ${App.fmtBytes(s.bytes)}`;
      }
    } catch {}
  }

  window.Cam = {
    // Live control — applies immediately to sensor, does NOT save
    async ctrl(key, val) {
      const payload = ['hmirror','vflip','colorbar'].includes(key)
        ? { [key]: !!Number(val) }
        : { [key]: Number(val) };
      try {
        const res = await App.apiPost('/api/camera/ctrl', payload);
        if (res.status === 'failed') App.showToast('Camera sensor unavailable', 'warn');
      }
      catch(e) { App.showToast(`Camera control error: ${e.message}`, 'danger'); }
    },

    // Save all current control values to device NVS
    async saveAll() {
      const btn = document.getElementById('cam-save-btn');
      if (btn) { btn.classList.add('loading'); btn.disabled = true; }
      const c = readControls();
      try {
        await App.apiPost('/api/settings/save', { camera: {
          frameSize:  c.frameSize,
          quality:    c.quality,
          brightness: c.brightness,
          contrast:   c.contrast,
          saturation: c.saturation,
          wbMode:     c.wbMode,
          special:    c.special,
          hmirror:    c.hmirror,
          vflip:      c.vflip,
        }});
        App.showToast('Camera settings saved', 'ok');
      } catch { App.showToast('Save failed', 'danger'); }
      if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
    },

    // Presets (localStorage)
    savePreset() {
      const nameEl = document.getElementById('cam-preset-name');
      const name = nameEl?.value?.trim();
      if (!name) { App.showToast('Enter a preset name', 'warn'); return; }
      const p = getPresets();
      p[name] = readControls();
      savePresets(p);
      refreshPresetList();
      if (nameEl) nameEl.value = '';
      App.showToast(`Preset "${name}" saved`, 'ok');
    },
    async loadPreset() {
      const sel = document.getElementById('cam-preset-sel');
      const name = sel?.value;
      const p = getPresets();
      if (!name || !p[name]) { App.showToast('Select a preset first', 'warn'); return; }
      applyToUI(p[name]);
      // Send live to device
      const c = p[name];
      const calls = [
        App.apiPost('/api/camera/ctrl', { brightness: c.brightness, contrast: c.contrast, saturation: c.saturation, wb_mode: c.wbMode, special: c.special }),
        App.apiPost('/api/camera/ctrl', { hmirror: !!c.hmirror, vflip: !!c.vflip, colorbar: !!c.colorbar }),
      ];
      try { await Promise.all(calls); App.showToast(`Preset "${name}" loaded`, 'ok'); }
      catch { App.showToast('Loaded but some controls may have failed', 'warn'); }
    },
    deletePreset() {
      const sel = document.getElementById('cam-preset-sel');
      const name = sel?.value;
      if (!name) return;
      const p = getPresets();
      delete p[name];
      savePresets(p);
      refreshPresetList();
      App.showToast(`Preset "${name}" deleted`, 'ok');
    },

    async restart() {
      const btn = document.getElementById('cam-restart-btn');
      if (btn) { btn.classList.add('loading'); btn.disabled = true; }
      try {
        await App.apiPost('/api/camera/restart');
        App.showToast('Camera restarting…', 'ok');
        setTimeout(()=>{ if(btn){btn.classList.remove('loading');btn.disabled=false;} }, 3000);
      } catch {
        App.showToast('Restart failed', 'danger');
        if (btn) { btn.classList.remove('loading'); btn.disabled = false; }
      }
    },
    snapshot() {
      const a = document.createElement('a');
      a.href = '/api/camera/snapshot';
      a.download = `reptmon-${Date.now()}.jpg`;
      a.click();
    },
    snapshotFull() {
      const a = document.createElement('a');
      a.href = '/api/camera/snapshot_full';
      a.download = `reptmon-fullres-${Date.now()}.jpg`;
      a.click();
    },
    cleanup() {
      clearInterval(statsTimer);
      if (camCanvas && App.CamWS) App.CamWS.removeConsumer(camCanvas);
    }
  };

  if (typeof Tabs !== 'undefined') Tabs.register('camera', ()=>{});
  init();
})();
</script>
